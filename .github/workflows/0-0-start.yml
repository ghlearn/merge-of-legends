name: 0-0 Start

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      closed-issue-number:
        description: "Closed quest issue number to comment on with the next issue link"
        required: false
        type: string
    outputs:
      issue-url:
        description: "URL of the created or existing open quest issue"
        value: ${{ jobs.start_exercise.outputs.issue_url }}
  issues:
    types: [closed]

concurrency:
  group: quest-start-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  issues: write

env:
  EXERCISE_TITLE: "Merge of Legends"
  ISSUE_TITLE_PREFIX: "Quest: "

jobs:
  start_exercise:
    name: Start Exercise
    runs-on: ubuntu-latest
    outputs:
      issue_url: ${{ steps.set-next-issue-url.outputs.issue_url }}
      issue_number: ${{ steps.set-issue-number.outputs.issue_number }}
      character: ${{ steps.determine-character.outputs.character }}
      should_run: ${{ steps.should-run.outputs.should_run }}
      should_start_challenge: ${{ steps.set-should-start.outputs.should_start_challenge }}

    steps:
      - name: Decide whether to run quest flow
        id: should-run
        uses: actions/github-script@v7
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
          EXERCISE_TITLE: ${{ env.EXERCISE_TITLE }}
          ISSUE_TITLE_PREFIX: ${{ env.ISSUE_TITLE_PREFIX }}
        with:
          script: |
            const event = JSON.parse(process.env.EVENT_PAYLOAD);
            const expectedTitle = `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`;
            const issueTitle = event.issue?.title ?? '';
            const shouldRun = process.env.EVENT_NAME !== 'issues' || issueTitle === expectedTitle;

            core.info(`Event name: ${process.env.EVENT_NAME}`);
            core.info(`Issue title: ${issueTitle || '(none)'}`);
            core.info(`Expected title: ${expectedTitle}`);
            core.setOutput('should_run', shouldRun.toString());

      - name: Checkout
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Determine next character
        id: determine-character
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          INPUT_CLOSED_ISSUE_NUMBER: ${{ inputs['closed-issue-number'] }}
        with:
          script: |
            const { resolveNextCharacter } = require('./.github/workflows/quest-issue-utils');

            const fromInput = (process.env.INPUT_CLOSED_ISSUE_NUMBER || '').toString().trim();
            const eventIssueNumber =
              context.eventName === 'issues' && context.payload.issue
                ? String(context.payload.issue.number)
                : '';
            const closedIssueNumber = fromInput || eventIssueNumber || '';

            let closedIssueBody = null;
            let comments = [];

            if (closedIssueNumber) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(closedIssueNumber)
              });
              closedIssueBody = issue.body;
              comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(closedIssueNumber)
              });
            }

            const character = resolveNextCharacter(closedIssueBody, comments);
            core.info(`Next character: ${character}`);
            core.setOutput('character', character);

      - name: Check for existing open quest issue
        id: existing-open-issue
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          EXERCISE_TITLE: ${{ env.EXERCISE_TITLE }}
          ISSUE_TITLE_PREFIX: ${{ env.ISSUE_TITLE_PREFIX }}
          TARGET_CHARACTER: ${{ steps.determine-character.outputs.character }}
        with:
          script: |
            const expectedTitle = `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`;
            const targetCharacter = process.env.TARGET_CHARACTER;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const questIssues = issues.filter(issue => !issue.pull_request && issue.title === expectedTitle);

            // Annotate each issue with its embedded character tag
            for (const issue of questIssues) {
              const match = (issue.body || '').match(/<!--\s*quest-character:\s*(mona|copilot|ducky)\s*-->/i);
              issue._character = match ? match[1].toLowerCase() : null;
            }

            // Find a quest issue that matches the target character
            const matchingIssue = questIssues.find(i => i._character === targetCharacter);

            // Close all non-matching quest issues (wrong character or stale duplicates)
            for (const issue of questIssues) {
              if (issue !== matchingIssue) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                core.info(`Closed non-matching open quest issue #${issue.number} (character: ${issue._character})`);
              }
            }

            if (matchingIssue) {
              core.info(`Open quest issue for ${targetCharacter} already exists: #${matchingIssue.number}`);
              core.setOutput('has_open_issue', 'true');
              core.setOutput('issue_url', matchingIssue.html_url);
              core.setOutput('issue_number', matchingIssue.number.toString());

              // Detect whether the challenge has been started (any comments posted)
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matchingIssue.number
              });
              core.setOutput('has_challenge_started', comments.length > 0 ? 'true' : 'false');
              core.info(`Challenge started: ${comments.length > 0}`);
            } else {
              core.setOutput('has_open_issue', 'false');
              core.setOutput('has_challenge_started', 'false');
            }

      - name: Disable all exercise workflows
        if: steps.should-run.outputs.should_run == 'true'
        run: |
          # Find all workflow files that start with a number (0-9)
          workflows=$(git ls-files | grep -E '^\.github/workflows/[0-9].*\.(yml|yaml)$')
          for workflow in $workflows; do
            workflow_name="$(basename "$workflow")"
            echo "Disabling workflow: $workflow_name"
            gh workflow disable "$workflow_name" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build issue description
        id: build-issue-description
        if: steps.should-run.outputs.should_run == 'true' && steps.existing-open-issue.outputs.has_open_issue != 'true'
        uses: ./.github/actions/render-markdown-template
        with:
          template-file: .github/steps/0-0-${{ steps.determine-character.outputs.character }}-start.md
          repo-image-base-url: ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.event.repository.default_branch }}/.github/images

      - name: Create issue
        id: create-issue
        if: steps.should-run.outputs.should_run == 'true' && steps.existing-open-issue.outputs.has_open_issue != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Show repo where issue will be created
            console.log(`Creating issue in repository:${ context.repo.owner }/${ context.repo.repo }`);

            // Create the issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`,
              body: process.env.ISSUE_BODY
            });

            // Return the location
            core.setOutput('issue_url', issue.html_url);
            core.setOutput('issue_number', issue.number.toString());
        env:
          ISSUE_REPOSITORY: ${{ env.ISSUE_REPOSITORY || github.repository }}
          ISSUE_BODY: ${{ steps.build-issue-description.outputs.rendered-text }}
          EXERCISE_TITLE: ${{ env.EXERCISE_TITLE }}
          ISSUE_TITLE_PREFIX: ${{ env.ISSUE_TITLE_PREFIX }}

      - name: Set next issue URL
        id: set-next-issue-url
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          EXISTING_ISSUE_URL: ${{ steps.existing-open-issue.outputs.issue_url }}
          CREATED_ISSUE_URL: ${{ steps.create-issue.outputs.issue_url }}
        with:
          script: |
            core.setOutput('issue_url', process.env.EXISTING_ISSUE_URL || process.env.CREATED_ISSUE_URL || '');

      - name: Set issue number
        id: set-issue-number
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          EXISTING_ISSUE_NUMBER: ${{ steps.existing-open-issue.outputs.issue_number }}
          CREATED_ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue_number }}
        with:
          script: |
            core.setOutput('issue_number', process.env.EXISTING_ISSUE_NUMBER || process.env.CREATED_ISSUE_NUMBER || '');

      - name: Set should-start-challenge
        id: set-should-start
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          HAS_OPEN_ISSUE: ${{ steps.existing-open-issue.outputs.has_open_issue }}
          HAS_CHALLENGE_STARTED: ${{ steps.existing-open-issue.outputs.has_challenge_started }}
          CREATED_ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue_number }}
        with:
          script: |
            const isNewIssue = (process.env.CREATED_ISSUE_NUMBER || '') !== '';
            const isReusedUnstarted =
              process.env.HAS_OPEN_ISSUE === 'true' && process.env.HAS_CHALLENGE_STARTED !== 'true';
            const shouldStart = isNewIssue || isReusedUnstarted;
            core.setOutput('should_start_challenge', shouldStart.toString());
            core.info(`New issue: ${isNewIssue}, Reused unstarted: ${isReusedUnstarted}, Should start: ${shouldStart}`);

      - name: Set closed issue number
        id: set-closed-issue-number
        if: steps.should-run.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          INPUT_CLOSED_ISSUE_NUMBER: ${{ inputs['closed-issue-number'] }}
        with:
          script: |
            const fromInput = (process.env.INPUT_CLOSED_ISSUE_NUMBER || '').toString().trim();
            const eventIssueNumber =
              context.eventName === 'issues' && context.payload.issue
                ? String(context.payload.issue.number)
                : '';
            const issueNumber = fromInput || eventIssueNumber || '';

            core.info(`Event: ${context.eventName}`);
            core.info(`Closed issue number from input: "${fromInput}"`);
            core.info(`Closed issue number from event: "${eventIssueNumber}"`);
            core.info(`Resolved closed issue number: "${issueNumber}"`);

            if (issueNumber && !/^\d+$/.test(issueNumber)) {
              core.setFailed(`Closed issue number must be numeric. Received: ${issueNumber}`);
              return;
            }

            core.setOutput('issue_number', issueNumber);

      - name: Build close comment
        id: build-close-comment
        if: ${{ steps.should-run.outputs.should_run == 'true' && steps.set-next-issue-url.outputs.issue_url != '' && steps.set-closed-issue-number.outputs.issue_number != '' }}
        uses: ./.github/actions/render-markdown-template
        with:
          template-file: .github/steps/x-close-with-next-link.md
          template-vars: |
            next_issue_url: ${{ steps.set-next-issue-url.outputs.issue_url }}

      - name: Add comment - close with next issue link
        if: ${{ steps.should-run.outputs.should_run == 'true' && steps.set-next-issue-url.outputs.issue_url != '' && steps.set-closed-issue-number.outputs.issue_number != '' }}
        uses: actions/github-script@v7
        env:
          CLOSED_ISSUE_NUMBER: ${{ steps.set-closed-issue-number.outputs.issue_number }}
          COMMENT_BODY: ${{ steps.build-close-comment.outputs.rendered-text }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.CLOSED_ISSUE_NUMBER),
              body: process.env.COMMENT_BODY
            });

      - name: Reenable to allow restarting
        if: steps.should-run.outputs.should_run == 'true'
        run: |
          gh workflow enable "0-0 Start" || true
          gh workflow enable "0-2 Char Switch" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mona_start:
    name: Start Mona challenge
    needs: start_exercise
    if: needs.start_exercise.outputs.character == 'mona' && needs.start_exercise.outputs.should_run == 'true' && needs.start_exercise.outputs.should_start_challenge == 'true'
    uses: ./.github/workflows/1-1-mona-start.yml
    with:
      issue-number: ${{ fromJson(needs.start_exercise.outputs.issue_number) }}
    secrets: inherit

  copilot_start:
    name: Start Copilot challenge
    needs: start_exercise
    if: needs.start_exercise.outputs.character == 'copilot' && needs.start_exercise.outputs.should_run == 'true' && needs.start_exercise.outputs.should_start_challenge == 'true'
    uses: ./.github/workflows/2-1-copilot-start.yml
    with:
      issue-number: ${{ fromJson(needs.start_exercise.outputs.issue_number) }}
    secrets: inherit

  ducky_start:
    name: Start Ducky challenge
    needs: start_exercise
    if: needs.start_exercise.outputs.character == 'ducky' && needs.start_exercise.outputs.should_run == 'true' && needs.start_exercise.outputs.should_start_challenge == 'true'
    uses: ./.github/workflows/3-1-ducky-start.yml
    with:
      issue-number: ${{ fromJson(needs.start_exercise.outputs.issue_number) }}
    secrets: inherit
